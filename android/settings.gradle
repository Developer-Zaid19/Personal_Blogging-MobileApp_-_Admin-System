rootProject.name = 'developerzaidblogs'
include ':react-native-config'
project(':react-native-config').projectDir = new File(
  rootProject.projectDir,
  '../node_modules/react-native-config/android',
)

// React Native native modules settings
apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

include ':app'
includeBuild('../node_modules/react-native-gradle-plugin')

// New Architecture (Fabric + TurboModules) enable
if (settings.hasProperty("newArchEnabled") && settings.newArchEnabled.toString().toBoolean()) {
    include(":ReactAndroid")
    project(":ReactAndroid").projectDir = file("../node_modules/react-native/ReactAndroid")
}
